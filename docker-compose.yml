services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./mcp-server/qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        ["CMD-SHELL", "bash -c 'cat < /dev/tcp/127.0.0.1/6333 >/dev/null 2>&1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Enable GPU passthrough for NVIDIA RTX cards.
    # Requires NVIDIA Container Toolkit installed on the host.
    # Remove the 'deploy' block if you want CPU-only mode.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        ["CMD-SHELL", "bash -c 'cat < /dev/tcp/127.0.0.1/11434 >/dev/null 2>&1'"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
